name: Weekly Portfolio Insights

on:
  schedule:
    - cron: '0 9 * * 1'   # Monday 09:00 UTC

  workflow_dispatch:

jobs:
  generate-insight:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Weekly Insight
        run: |
          curl -X POST \
          https://finch-production-95c79.up.railway.app/api/v1/insights/generate